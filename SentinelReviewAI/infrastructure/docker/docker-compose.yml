version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev_password
      POSTGRES_DB: sentinel_review_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Queue
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ./backend
      dockerfile: services/api-gateway/Dockerfile
    container_name: sentinel-api-gateway
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production
      API_KEY: dev_api_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Git Integration Service
  git-integration:
    build:
      context: ./backend
      dockerfile: services/git-integration/Dockerfile
    container_name: sentinel-git-integration
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
      GITHUB_WEBHOOK_SECRET: dev_github_secret
      GITLAB_WEBHOOK_SECRET: dev_gitlab_secret
      BITBUCKET_WEBHOOK_SECRET: dev_bitbucket_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # AI Review Engine
  ai-review-engine:
    build:
      context: ./backend
      dockerfile: services/ai-review-engine/Dockerfile
    container_name: sentinel-ai-review-engine
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: development
      PORT: 4002
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: gpt-4
      MAX_FILE_SIZE: 1048576
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Context Engine
  context-engine:
    build:
      context: ./backend
      dockerfile: services/context-engine/Dockerfile
    container_name: sentinel-context-engine
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: development
      PORT: 4003
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Policy Engine
  policy-engine:
    build:
      context: ./backend
      dockerfile: services/policy-engine/Dockerfile
    container_name: sentinel-policy-engine
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: development
      PORT: 4004
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Webhook Listener
  webhook-listener:
    build:
      context: ./backend
      dockerfile: services/webhook-listener/Dockerfile
    container_name: sentinel-webhook-listener
    ports:
      - "4005:4005"
    environment:
      NODE_ENV: development
      PORT: 4005
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Analytics Service
  analytics:
    build:
      context: ./backend
      dockerfile: services/analytics/Dockerfile
    container_name: sentinel-analytics
    ports:
      - "4006:4006"
    environment:
      NODE_ENV: development
      PORT: 4006
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Learning Engine
  learning-engine:
    build:
      context: ./backend
      dockerfile: services/learning-engine/Dockerfile
    container_name: sentinel-learning-engine
    ports:
      - "4007:4007"
    environment:
      NODE_ENV: development
      PORT: 4007
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Merge Gate
  merge-gate:
    build:
      context: ./backend
      dockerfile: services/merge-gate/Dockerfile
    container_name: sentinel-merge-gate
    ports:
      - "4008:4008"
    environment:
      NODE_ENV: development
      PORT: 4008
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@postgres:5432/sentinel_review_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:4000
    depends_on:
      - api-gateway
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: sentinel-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - frontend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: sentinel-network
