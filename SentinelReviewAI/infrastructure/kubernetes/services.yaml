apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-review-ai
  labels:
    name: sentinel-review-ai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: sentinel-review-ai
data:
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://postgres:5432/sentinel"
  REDIS_URL: "redis://redis:6379"
  API_URL: "http://api-gateway:4000"
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: sentinel-review-ai
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production"
  API_KEY: "change-me-in-production"
  GITHUB_WEBHOOK_SECRET: "change-me-in-production"
  GITLAB_WEBHOOK_SECRET: "change-me-in-production"
  BITBUCKET_WEBHOOK_SECRET: "change-me-in-production"
  OPENAI_API_KEY: "sk-change-me-in-production"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
  selector:
    app: api-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: git-integration
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4001
      targetPort: 4001
  selector:
    app: git-integration
---
apiVersion: v1
kind: Service
metadata:
  name: ai-review-engine
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4002
      targetPort: 4002
  selector:
    app: ai-review-engine
---
apiVersion: v1
kind: Service
metadata:
  name: context-engine
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4003
      targetPort: 4003
  selector:
    app: context-engine
---
apiVersion: v1
kind: Service
metadata:
  name: policy-engine
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4004
      targetPort: 4004
  selector:
    app: policy-engine
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-listener
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4005
      targetPort: 4005
  selector:
    app: webhook-listener
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4006
      targetPort: 4006
  selector:
    app: analytics
---
apiVersion: v1
kind: Service
metadata:
  name: learning-engine
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4007
      targetPort: 4007
  selector:
    app: learning-engine
---
apiVersion: v1
kind: Service
metadata:
  name: merge-gate
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 4008
      targetPort: 4008
  selector:
    app: merge-gate
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sentinel-review-ai
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
  namespace: sentinel-review-ai
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
    - port: 443
      targetPort: 443
  selector:
    app: nginx
